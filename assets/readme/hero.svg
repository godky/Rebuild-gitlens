<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Rebuild GitLens</title>
  <desc id="desc">一个自动同步上游 GitLens release、应用本地补丁并打包成可安装 vsix 的 GitHub Actions 工作流。</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f8fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" rx="26" fill="url(#bg)"/>

  <!-- Subtle grid motif -->
  <g opacity="0.08" stroke="#1f2328" stroke-width="0.5">
    <line x1="640" y1="0" x2="640" y2="360"/>
    <line x1="760" y1="0" x2="760" y2="360"/>
    <line x1="880" y1="0" x2="880" y2="360"/>
    <line x1="1000" y1="0" x2="1000" y2="360"/>
    <line x1="1120" y1="0" x2="1120" y2="360"/>
  </g>

  <!-- Left title block -->
  <g transform="translate(64 58)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#656d76" letter-spacing="0.08em">GITHUB ACTIONS WORKFLOW</text>

    <text x="0" y="56" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="700" fill="#1f2328">Rebuild GitLens</text>

    <text x="0" y="116" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#4a535c">自动同步上游 release，应用本地补丁，</text>
    <text x="0" y="146" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#4a535c">构建可安装的 .vsix 扩展包。</text>

    <g transform="translate(0 198)">
      <circle cx="6" cy="-6" r="5" fill="#1a7f37"/>
      <text x="20" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#656d76">MIT License · AliverAnme</text>
    </g>
  </g>

  <!-- Right pipeline block -->
  <g transform="translate(620 48)">
    <!-- Vertical connector -->
    <line x1="64" y1="38" x2="64" y2="238" stroke="#d0d7de" stroke-width="2" stroke-dasharray="4 4"/>

    <!-- Step 1: Fetch -->
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="500" height="66" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
      <circle cx="28" cy="33" r="14" fill="#ffffff" stroke="#0969da" stroke-width="1.5"/>
      <text x="28" y="38" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#0969da">1</text>
      <text x="54" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="600" fill="#1f2328">Fetch upstream release</text>
      <text x="54" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#656d76">gitkraken/vscode-gitlens@v17.8.1</text>
      <circle cx="472" cy="33" r="4" fill="#0969da" opacity="0.8"/>
    </g>

    <!-- Arrow -->
    <path d="M64 73 L64 83" stroke="#0969da" stroke-width="2" fill="none"/>

    <!-- Step 2: Patch -->
    <g transform="translate(0 90)">
      <rect x="0" y="0" width="500" height="66" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
      <circle cx="28" cy="33" r="14" fill="#ffffff" stroke="#8250df" stroke-width="1.5"/>
      <text x="28" y="38" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#8250df">2</text>
      <text x="54" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="600" fill="#1f2328">Apply local patches</text>
      <text x="54" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#656d76">fix-checkin.patch · fix-subscription.patch</text>
      <circle cx="472" cy="33" r="4" fill="#8250df" opacity="0.8"/>
    </g>

    <!-- Arrow -->
    <path d="M64 163 L64 173" stroke="#8250df" stroke-width="2" fill="none"/>

    <!-- Step 3: Build -->
    <g transform="translate(0 180)">
      <rect x="0" y="0" width="500" height="66" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
      <circle cx="28" cy="33" r="14" fill="#ffffff" stroke="#1a7f37" stroke-width="1.5"/>
      <text x="28" y="38" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#1a7f37">3</text>
      <text x="54" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="600" fill="#1f2328">Build VSIX package</text>
      <text x="54" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#656d76">pnpm install → pnpm package</text>
      <circle cx="472" cy="33" r="4" fill="#1a7f37" opacity="0.8"/>
    </g>

    <!-- Arrow -->
    <path d="M64 253 L64 263" stroke="#1a7f37" stroke-width="2" fill="none"/>

    <!-- Step 4: Release -->
    <g transform="translate(0 270)">
      <rect x="0" y="0" width="500" height="66" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
      <circle cx="28" cy="33" r="14" fill="#ffffff" stroke="#cf5e0e" stroke-width="1.5"/>
      <text x="28" y="38" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#cf5e0e">4</text>
      <text x="54" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="600" fill="#1f2328">Publish GitHub Release</text>
      <text x="54" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#656d76">gitlens-v17.8.1.vsix + changelog</text>
      <circle cx="472" cy="33" r="4" fill="#cf5e0e" opacity="0.8"/>
    </g>
  </g>
</svg>
